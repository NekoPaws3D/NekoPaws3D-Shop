<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kontakt – NekoPaws3D</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header class="header simple">
  <a href="index.html" class="back-link">⬅ Zurück zum Shop</a>
</header>

<main class="page contact-page">
  <h1>Kontakt</h1>
  <p>Schreibe uns über das Formular. Deine Nachricht wird direkt an die im EmailJS-Konto verbundene Shop-Adresse gesendet.</p>

  <form id="contact-form" class="mail-form" onsubmit="submitContactForm(event)">

    <label for="contact-name">Name *</label>
    <input id="contact-name" name="from_name" required maxlength="100" autocomplete="name">

    <label for="contact-email">E-Mail *</label>
    <input id="contact-email" type="email" name="reply_to" required maxlength="160" autocomplete="email">

    <label for="contact-phone">Telefon (optional)</label>
    <input id="contact-phone" type="tel" name="phone" maxlength="50" autocomplete="tel">

    <label for="contact-subject">Betreff *</label>
    <input id="contact-subject" name="subject" required maxlength="160">

    <label for="contact-message">Nachricht *</label>
    <textarea id="contact-message" name="message" required maxlength="4000" rows="8"></textarea>

    <label class="consent-check">
      <input type="checkbox" required>
      Ich stimme zu, dass meine Angaben zur Bearbeitung der Anfrage per E-Mail übermittelt werden.
    </label>

    <button class="main-btn" type="submit">Nachricht senden</button>
    <p id="contact-status" class="form-status" role="status" aria-live="polite"></p>
  </form>

  <section class="mail-notice">
    <h2>EmailJS</h2>
    <p>Die Zugangsdaten werden einmalig in <code>js/email-config.js</code> eingetragen. Das Design der Website bleibt unverändert.</p>
  </section>
</main>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script src="js/email-config.js"></script>
<script src="js/products.js"></script>
<script src="js/email-service.js"></script>
<script src="js/contact.js"></script>
</body>
</html>
